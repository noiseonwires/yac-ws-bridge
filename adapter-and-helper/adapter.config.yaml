bridge:
  url: "wss://<api-gateway-domain>/_adapter"
  authToken: "<shared-secret>"
  reconnect:
    initialDelayMs: 1000
    maxDelayMs: 30000
    backoffMultiplier: 2
  pingIntervalMs: 30000

# Local TUN device. Configure both ends with matching /30 endpoints.
tun:
  name: "btf0"
  address: "10.200.0.1"
  peerAddress: "10.200.0.2"
  mtu: 1400

http:
  listenPort: 3001

writeCoalescing:
  enabled: false
  delayMs: 5

wsApi:
  mode: "grpc"

logging:
  level: "info"
