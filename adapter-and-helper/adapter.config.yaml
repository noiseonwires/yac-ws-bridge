# Adapter — accepts streams from the bridge and forwards them to a local target.

bridge:
  url: "wss://YOUR_APIGW_ID.apigw.yandexcloud.net/_adapter"
  authToken: "YOUR_AUTH_TOKEN"
  reconnect:
    initialDelayMs: 1000
    maxDelayMs: 30000
    backoffMultiplier: 2.0
  pingIntervalMs: 30000

# Local service the adapter connects to for each incoming stream.
target:
  address: "127.0.0.1:1080"

# Optional HTTP endpoint for health / status checks (0 = disabled).
http:
  listenPort: 0


# QUIC transport settings.
quic:
  mtu: 1200         # QUIC packet size (bytes). Default 1200. Can go up to ~65K over WS.
  sendWorkers: 8     # Concurrent wsSend goroutines. More = higher throughput, more API load.

wsApi:
  mode: "grpc"

logging:
  level: "info"
