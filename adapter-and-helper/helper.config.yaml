# Helper — accepts local TCP connections and tunnels them through the bridge.

bridge:
  url: "wss://YOUR_APIGW_ID.apigw.yandexcloud.net/_helper"
  authToken: "YOUR_AUTH_TOKEN"
  reconnect:
    initialDelayMs: 1000
    maxDelayMs: 30000
    backoffMultiplier: 2.0
  pingIntervalMs: 30000

# Local address helper listens on for incoming TCP connections.
listen:
  address: "127.0.0.1:1080"


# QUIC transport settings.
quic:
  mtu: 1200         # QUIC packet size (bytes). Default 1200. Can go up to ~65K over WS.
  sendWorkers: 8     # Concurrent wsSend goroutines. More = higher throughput, more API load.

wsApi:
  mode: "grpc"
  relay: false

logging:
  level: "info"
