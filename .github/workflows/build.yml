name: Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  GO_VERSION: '1.26'
  DOTNET_VERSION: '10.0.x'

jobs:
  # ---------------------------------------------------------------------------
  # Go: adapter + helper for linux/amd64, linux/arm64, windows/amd64
  # ---------------------------------------------------------------------------
  build-go:
    name: Go ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
            ext: ''
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
            ext: ''
          - goos: windows
            goarch: amd64
            suffix: windows-amd64
            ext: '.exe'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: adapter-and-helper/go.sum

      - name: Build adapter + helper
        working-directory: adapter-and-helper
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" \
            -o dist/adapter-${{ matrix.suffix }}${{ matrix.ext }} ./cmd/adapter
          go build -trimpath -ldflags="-s -w" \
            -o dist/helper-${{ matrix.suffix }}${{ matrix.ext }} ./cmd/helper

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-${{ matrix.suffix }}
          path: adapter-and-helper/dist/*
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # MAUI: Windows (framework-dependent — requires .NET 10 runtime installed)
  # ---------------------------------------------------------------------------
  build-maui-windows:
    name: MAUI Windows (win-x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore MAUI workloads
        working-directory: maui-client
        run: dotnet workload restore BridgeToFreedom.csproj --ignore-failed-sources

      - name: Publish (framework-dependent)
        working-directory: maui-client
        shell: pwsh
        run: |
          dotnet publish BridgeToFreedom.csproj `
            -f net10.0-windows10.0.19041.0 `
            -c Release `
            -r win-x64 `
            --no-self-contained `
            -p:WindowsPackageType=None `
            -p:PublishReadyToRun=false `
            -p:PublishTrimmed=false `
            -o publish/win-x64

      - name: Zip Windows build
        working-directory: maui-client
        shell: pwsh
        run: |
          Compress-Archive -Path publish/win-x64/* `
            -DestinationPath BridgeToFreedom-windows-x64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: maui-windows-x64
          path: maui-client/BridgeToFreedom-windows-x64.zip
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # MAUI: Android (APK is already self-contained, AOT)
  # ---------------------------------------------------------------------------
  build-maui-android:
    name: MAUI Android (APK)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore MAUI workloads
        working-directory: maui-client
        run: dotnet workload restore BridgeToFreedom.csproj --ignore-failed-sources

      - name: Publish APK (Release, arm64-v8a)
        working-directory: maui-client
        shell: pwsh
        run: |
          dotnet publish BridgeToFreedom.csproj `
            -f net10.0-android `
            -c Release `
            -p:RuntimeIdentifier=android-arm64 `
            -p:AndroidPackageFormat=apk `
            -p:AndroidEnableProfiledAot=false `
            -o publish/android

      - name: Collect APK
        working-directory: maui-client
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path out | Out-Null
          $apks = Get-ChildItem -Path publish/android -Filter *-Signed.apk -Recurse
          if (-not $apks) { $apks = Get-ChildItem -Path publish/android -Filter *.apk -Recurse }
          if (-not $apks) { throw "No APK produced" }
          $apks | ForEach-Object { Copy-Item $_.FullName "out/BridgeToFreedom-android.apk" -Force }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: maui-android
          path: maui-client/out/BridgeToFreedom-android.apk
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # MAUI: Linux (self-contained linux-x64 via the GTK4 backend)
  #
  # Build only — no native GTK4 libs are needed in CI. They ARE required to
  # RUN the app on a Linux desktop (see maui-client/README.md "Linux build").
  #
  # WORKLOAD NOTE: We DO NOT install the full `maui` metapackage (it pulls in
  # ios/maccatalyst which require macOS and fail on Linux with NETSDK1147).
  # However, the SDK's ImportWorkloads check sees `Microsoft.Maui.Controls`
  # + `<UseMaui>true</UseMaui>` and insists on at least ONE maui sub-workload.
  # On Linux the only Linux-installable one is `maui-tizen` — installing it
  # is a tiny no-op (we never target net10.0-tizen) that satisfies the check.
  # ---------------------------------------------------------------------------
  build-maui-linux:
    name: MAUI Linux (linux-x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install maui-tizen workload (placeholder to satisfy SDK check)
        run: dotnet workload install maui-tizen --ignore-failed-sources

      - name: Publish (self-contained linux-x64)
        working-directory: maui-client-linux
        run: |
          dotnet publish BridgeToFreedom.Linux.csproj \
            -c Release \
            -r linux-x64 \
            --self-contained \
            -o publish/linux-x64

      # upload-artifact wraps every upload in a ZIP, so we upload the raw
      # publish folder rather than a pre-made tarball (avoids double-packing).
      # The release job re-tars these files into BridgeToFreedom-linux-x64.tar.gz.
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: maui-linux-x64
          path: maui-client-linux/publish/linux-x64/
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Cloud function: plain zip (obfuscate yourself before uploading to YC)
  # ---------------------------------------------------------------------------
  build-cloud:
    name: Cloud function (plain)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare staging dir
        run: |
          mkdir -p dist/plain
          cp bridge-cloud/index.js bridge-cloud/package.json bridge-cloud/spec.yaml dist/plain/

      - name: Zip plain
        run: |
          cd dist/plain
          zip -9 -r ../../bridge-cloud-plain.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bridge-cloud
          path: bridge-cloud-plain.zip
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Release: attach all artifacts on tag pushes
  # ---------------------------------------------------------------------------
  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-go, build-maui-windows, build-maui-android, build-maui-linux, build-cloud]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Repackage Linux publish folder into release tarball
        run: |
          if [ -d artifacts/maui-linux-x64 ]; then
            mkdir -p release
            tar -czf release/BridgeToFreedom-linux-x64.tar.gz -C artifacts/maui-linux-x64 .
          fi

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( \
            -name 'adapter-*' -o \
            -name 'helper-*' -o \
            -name '*.apk' -o \
            -name '*.zip' \
          \) -exec cp -v {} release/ \;
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
